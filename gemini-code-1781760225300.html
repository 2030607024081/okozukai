<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllowanceSync - 親の管理画面</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght=400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-color: #4f46e5; --bg-color: #f5f3ff; --text-main: #1e293b; --text-sub: #64748b; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; }
        body { background-color: #f8fafc; color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .app-card { background: white; width: 100%; max-width: 400px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); overflow: hidden; }
        .header { background: var(--main-color); color: white; padding: 20px; text-align: center; font-weight: 700; font-size: 18px; }
        .body { padding: 20px; }
        .balance-box { background: var(--bg-color); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #ddd6fe; }
        .balance-label { font-size: 13px; color: var(--text-sub); margin-bottom: 5px; }
        .balance-amount { font-size: 32px; font-weight: 700; }
        .section-title { font-size: 14px; font-weight: 700; margin: 20px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--main-color); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; color: white; cursor: pointer; transition: opacity 0.2s; }
        .btn-add { background: var(--success); }
        .btn-reduce { background: var(--danger); }
        .btn-clear { background: #64748b; padding: 4px 8px; font-size: 11px; border-radius: 4px; width: auto; flex: none; }
        .history-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .history-item { background: #f8fafc; padding: 10px; border-radius: 8px; border-left: 4px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .history-item.add { border-left-color: var(--success); }
        .history-item.reduce { border-left-color: var(--danger); }
        .item-date { font-size: 11px; color: var(--text-sub); }
        .amount.add { color: var(--success); font-weight: bold; }
        .amount.reduce { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header"><i class="fa-solid fa-user-tie"></i> お小遣い管理（親画面）</div>
        <div class="body">
            <div class="balance-box">
                <div class="balance-label">現在の子どもの残高</div>
                <div class="balance-amount"><span id="balance">0</span> 円</div>
            </div>

            <div class="form-group">
                <label>金額（円）</label>
                <input type="number" id="amount" placeholder="例: 500">
            </div>
            <div class="form-group">
                <label>理由・つかいみち</label>
                <input type="text" id="reason" placeholder="例: お手伝い、おやつ代など">
            </div>

            <div class="btn-group">
                <button class="btn-add" onclick="change(1)"><i class="fa-solid fa-plus"></i> 増やす</button>
                <button class="btn-reduce" onclick="change(-1)"><i class="fa-solid fa-minus"></i> 減らす</button>
            </div>

            <div class="section-title">
                <span>操作履歴</span>
                <button class="btn-clear" onclick="clearData()">履歴クリア</button>
            </div>
            <ul class="history-list" id="history"></ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://sjznysvfetgpmscyaqqk.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_RfA2RvaKOczFL7NvgFJ2FQ_4KfSfX96";

        // 2. クライアントの初期化
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentData = { balance: 0, history: [] };

        function renderView(data) {
            document.getElementById('balance').textContent = data.balance.toLocaleString();
            const histEl = document.getElementById('history');
            histEl.innerHTML = data.history.length ? '' : '<li style="color:#64748b; font-size:12px; text-align:center;">履歴はありません</li>';
            data.history.forEach(item => {
                histEl.insertAdjacentHTML('beforeend', `
                    <li class="history-item ${item.type}">
                        <div><div>${item.reason}</div><div class="item-date">${item.date}</div></div>
                        <div class="amount ${item.type}">${item.type==='add'?'+':'-'}${item.amount.toLocaleString()}円</div>
                    </li>`);
            });
        }

        async function loadData() {
            const { data, error } = await _supabase.from('allowance_sync').select('*').eq('id', 1).single();
            if (data) {
                currentData = data;
                renderView(currentData);
            }
        }

        // 3. HTMLのonclickから確実に呼び出せるようにグローバル関数として定義
        window.change = async function(dir) {
            const amtEl = document.getElementById('amount');
            const reasEl = document.getElementById('reason');
            const amt = parseInt(amtEl.value);
            let reas = reasEl.value.trim();

            if (isNaN(amt) || amt <= 0) return alert('金額を入力してください');
            if (dir === -1 && !reas) return alert('減らす時は理由を入力してください');
            if (dir === 1 && !reas) reas = 'お小遣い';
            if (dir === -1 && currentData.balance - amt < 0) return alert('残高が足りません');

            currentData.balance += (amt * dir);
            const now = new Date();
            currentData.history.unshift({
                type: dir === 1 ? 'add' : 'reduce',
                amount: amt,
                reason: reas,
                date: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`
            });

            await _supabase.from('allowance_sync').update({
                balance: currentData.balance,
                history: currentData.history
            }).eq('id', 1);

            amtEl.value = ''; reasEl.value = '';
        };

        window.clearData = async function() {
            if(confirm('リセットしますか？')) {
                await _supabase.from('allowance_sync').update({ balance: 0, history: [] }).eq('id', 1);
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            _supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'allowance_sync' }, (payload) => {
                currentData = payload.new;
                renderView(currentData);
            })
            .subscribe();
        });
    </script>
</body>
</html>
